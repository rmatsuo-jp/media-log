<!-- @file アプリシェル。router-outlet（メインコンテンツ）とボトムナビ（PCではサイドバー）を配置する。
     全文言は i18n.t() 経由で表示し、言語トグルの操作にリロードなしで追随する。
     bottom-nav には #bottomNav 参照を付与し、app.ts が ResizeObserver で実高さを監視して
     --bottom-nav-height に反映する。 -->
<div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed()">
  <main class="app-content">
    <router-outlet />
  </main>

  <nav class="bottom-nav" [class.collapsed]="sidebarCollapsed()" #bottomNav>
    <div class="sidebar-header">
      <a routerLink="/settings" class="sidebar-title"
        ><img src="favicon.svg" alt="" class="sidebar-logo" width="24" height="24" /><span>{{
          i18n.t('app.title')
        }}</span></a
      >
      <button
        type="button"
        class="sidebar-toggle"
        (click)="toggleSidebar()"
        [attr.aria-label]="
          sidebarCollapsed() ? i18n.t('sidebar.expand') : i18n.t('sidebar.collapse')
        "
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="15 18 9 12 15 6" />
        </svg>
      </button>
    </div>
    <a
      routerLink="/settings"
      routerLinkActive="active"
      #rla1="routerLinkActive"
      [attr.aria-current]="rla1.isActive ? 'page' : null"
      class="nav-item"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <circle cx="12" cy="12" r="3" />
        <path
          d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
        />
      </svg>
      <span>{{ i18n.t('nav.settings') }}</span>
    </a>
    @if (isDev) {
      <a
        routerLink="/dev"
        routerLinkActive="active"
        #rla2="routerLinkActive"
        [attr.aria-current]="rla2.isActive ? 'page' : null"
        class="nav-item"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="22"
          height="22"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
        <span>{{ i18n.t('nav.dev') }}</span>
      </a>
    }
    @if (sidebarCollapsed()) {
      <button
        type="button"
        class="lang-toggle-collapsed"
        [attr.aria-label]="i18n.t('sidebar.language')"
        (click)="toggleLanguage(i18n.lang() === 'ja' ? 'en' : 'ja')"
      >
        {{ i18n.lang() === 'ja' ? '日' : 'EN' }}
      </button>
    } @else {
      <div class="lang-toggle" role="group" [attr.aria-label]="i18n.t('sidebar.language')">
        <button
          type="button"
          class="lang-btn"
          [class.active]="i18n.lang() === 'ja'"
          (click)="toggleLanguage('ja')"
        >
          日
        </button>
        <button
          type="button"
          class="lang-btn"
          [class.active]="i18n.lang() === 'en'"
          (click)="toggleLanguage('en')"
        >
          EN
        </button>
      </div>
    }
  </nav>
</div>

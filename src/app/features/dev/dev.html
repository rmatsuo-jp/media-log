<!-- @file 開発者用ページテンプレート。localStorage生データのダンプ表示。 -->
<div class="page">
  <h1 class="page-title">開発</h1>
  <p class="hint">開発向けのデバッグツールです。ユーザーの記録データには影響しません。</p>

  <div class="form-group">
    <div class="section-header">
      <label class="label">app_settings（生データ）</label>
      <button class="copy-btn" type="button" (click)="copy('settings-dump', settingsDump())">
        {{ copiedKey() === 'settings-dump' ? 'コピーしました' : 'コピー' }}
      </button>
    </div>
    <textarea class="textarea" rows="6" readonly [value]="settingsDump()"></textarea>
  </div>

  @for (key of localStorageKeys(); track key) {
    <div class="form-group">
      <div class="section-header">
        <label class="label">{{ key }}</label>
        <button class="copy-btn" type="button" (click)="copy(key, dumpKey(key))">
          {{ copiedKey() === key ? 'コピーしました' : 'コピー' }}
        </button>
      </div>
      <textarea class="textarea" rows="4" readonly [value]="dumpKey(key)"></textarea>
    </div>
  }
</div>

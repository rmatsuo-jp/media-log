<!-- @file Settings ページテンプレート。セクション順はテーマ → 法的情報 → GitHubリポジトリ → アカウント（Google SSO 同期）。 -->
<div class="page">
  <h1 class="page-title">設定</h1>

  <div class="form-group">
    <label class="label">外観テーマ</label>
    <div class="theme-toggle">
      <button
        class="theme-btn"
        [class.active]="settings().theme === 'light'"
        (click)="updateTheme('light')"
        type="button"
      >
        ライト
      </button>
      <button
        class="theme-btn"
        [class.active]="settings().theme === 'dark'"
        (click)="updateTheme('dark')"
        type="button"
      >
        ダーク
      </button>
    </div>
  </div>

  <!-- ── 法的情報（データの送信先・利用条件・免責事項） ── -->
  <div class="form-group">
    <label class="label">法的情報</label>
    <p class="hint">
      <a routerLink="/legal/privacy">Privacy Policy</a> ・
      <a routerLink="/legal/terms">Terms of Service</a> ・
      <a routerLink="/legal/disclaimer">Disclaimer</a>
    </p>
  </div>

  <!-- ── GitHubリポジトリ ─────────── -->
  <div class="form-group">
    <label class="label">GitHub</label>
    <p class="hint">
      <a [href]="githubUrl" target="_blank" rel="noopener">{{ githubUrl }}</a>
    </p>
  </div>

  <app-account-panel />
</div>

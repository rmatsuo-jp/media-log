<!-- @file Settings ページテンプレート。セクション順はテーマ → 法的情報 → GitHubリポジトリ → バージョン情報 → アカウント（Google SSO 同期）。 -->
<div class="page">
  <h1 class="page-title">設定</h1>

  <div class="form-group">
    <label class="label">外観テーマ</label>
    <div class="theme-toggle">
      <button
        class="theme-btn"
        [class.active]="settings().theme === 'light'"
        (click)="updateTheme('light')"
        type="button"
      >
        ライト
      </button>
      <button
        class="theme-btn"
        [class.active]="settings().theme === 'dark'"
        (click)="updateTheme('dark')"
        type="button"
      >
        ダーク
      </button>
    </div>
  </div>

  <!-- ── 法的情報（データの送信先・利用条件・免責事項） ── -->
  <div class="form-group">
    <label class="label">法的情報</label>
    <p class="hint">
      <a routerLink="/legal/privacy">プライバシーポリシー</a> ・
      <a routerLink="/legal/terms">利用規約</a> ・
      <a routerLink="/legal/disclaimer">免責事項</a>
    </p>
  </div>

  <!-- ── GitHubリポジトリ ─────────── -->
  <div class="form-group">
    <label class="label">GitHub</label>
    <p class="hint">
      <a [href]="githubUrl" target="_blank" rel="noopener">{{ githubUrl }}</a>
    </p>
  </div>

  <!-- ── バージョン情報 ─────────── -->
  <div class="form-group">
    <label class="label">バージョン情報</label>
    <p class="hint">v{{ appVersion }}（{{ releaseDate }}）</p>
    <details class="release-notes">
      <summary>リリースノートを表示</summary>
      @for (release of releaseNotes(); track release.version) {
        <div class="release-note">
          <p class="release-note-title">v{{ release.version }}（{{ release.date }}）</p>
          <ul>
            @for (item of release.items; track item) {
              <li>{{ item }}</li>
            }
          </ul>
        </div>
      }
    </details>
  </div>

  <app-account-panel />
</div>

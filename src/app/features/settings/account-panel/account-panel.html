<!-- @file アカウントパネル（Google ログインでデータを複数端末で共有）。 -->
<div class="form-group">
  <label class="label">アカウント（データ同期）</label>
  <p class="hint">Google でログインすると、記録データを他の端末と共有できます。</p>
  @if (user(); as u) {
    <div class="account-card">
      @if (u.photoURL) {
        <img class="account-avatar" [src]="u.photoURL" alt="" referrerpolicy="no-referrer" />
      }
      <div class="account-info">
        <strong>{{ u.displayName || 'ログイン中' }}</strong>
        <span class="account-email">{{ u.email }}</span>
      </div>
      <button class="btn-secondary" (click)="logout()" [disabled]="authBusy()" type="button">
        ログアウト
      </button>
    </div>
  } @else {
    <button class="btn-primary" (click)="login()" [disabled]="authBusy()" type="button">
      @if (authBusy()) {
        処理中…
      } @else {
        Google でログイン
      }
    </button>
    <!-- クラウド同期はホワイトリスト制であることの常時表示注記 -->
    <p class="auth-note">
      クラウド同期は許可されたユーザー（ホワイトリスト制）のみ利用できます。ログインなしでもローカル保存で全機能を利用できます。
    </p>
  }
  <!-- 非許可ユーザーがログインを試みたときの拒否メッセージ -->
  @if (loginError(); as msg) {
    <p class="auth-error">{{ msg }}</p>
  }
</div>

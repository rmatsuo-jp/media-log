<!-- @file 追加フォームテンプレート。外部検索パネル（app-work-import）を常時表示し、
     手動入力はapp-work-import側の詳細設定にng-content投影して統合する。 -->
<div class="form-group add-form">
  <label class="label">作品を追加</label>
  <app-work-import [mediaType]="mediaType()" (imported)="onImported($event)">
    <div manualAdd class="add-row">
      <select
        class="select"
        [value]="newMediaType()"
        (change)="newMediaType.set($any($event.target).value)"
      >
        <option value="manga">マンガ</option>
        <option value="anime">アニメ</option>
      </select>
      <input
        class="text-input"
        type="text"
        placeholder="タイトル"
        [value]="newTitle()"
        (input)="newTitle.set($any($event.target).value)"
        (keydown.enter)="addWork()"
      />
      <button class="btn-primary" type="button" (click)="addWork()">手動で追加</button>
    </div>
  </app-work-import>
</div>

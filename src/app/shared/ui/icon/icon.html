@switch (name()) {
  @case ('correct') {
    <svg class="icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <path
        d="M4 10.5 8 14.5 16 6"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  }
  @case ('incorrect') {
    <svg class="icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <path
        d="M5 5 15 15M15 5 5 15"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
      />
    </svg>
  }
  @case ('enter') {
    <svg class="icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <path
        d="M16 4v6a2 2 0 0 1-2 2H5M8 9 5 12l3 3"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </svg>
  }
}
